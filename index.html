<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>muvin-bluvin 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede6;
    --muted: #888;
    --gold: #f5c542;
    --gold-dim: #c49a1a;
    --star-empty: #2e2e38;
    --accent: #e8503a;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 660px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 3rem;
  }
  .film-strip {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1.2rem;
  }
  .film-hole {
    width: 14px;
    height: 10px;
    border-radius: 2px;
    background: var(--bg3);
    border: 1px solid var(--border2);
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.2rem, 10vw, 5.5rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(245,197,66,0.2);
  }
  .header h1 span {
    color: var(--accent);
  }
  .header p {
    margin-top: 0.6rem;
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .card-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.55rem;
  }

  /* ── Inputs ── */
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    padding: 0.65rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -moz-appearance: textfield;
  }
  input[type="text"]::placeholder, input[type="number"]::placeholder {
    color: #3a3a48;
    font-style: italic;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--gold-dim);
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* ── Stars ── */
  .stars-row {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    margin: 0.4rem 0 1rem;
  }
  .star {
    cursor: pointer;
    font-size: 2.1rem;
    color: var(--star-empty);
    transition: color 0.12s, transform 0.1s;
    padding: 2px 3px;
    line-height: 1;
    user-select: none;
  }
  .star:hover { transform: scale(1.18); }
  .star.lit { color: var(--gold); }
  .star.hovered { color: var(--gold); }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
  }
  .rating-row .num-input-wrap {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .rating-row input[type="number"] {
    width: 68px;
    font-size: 1.1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    text-align: center;
    padding: 0.45rem 0.5rem;
  }
  .rating-badge {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .rating-badge span { color: var(--muted); font-size: 1.1rem; }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.4rem 0;
  }

  /* ── Save button ── */
  .btn-save {
    display: block;
    width: 100%;
    padding: 1rem;
    background: var(--gold);
    color: #0d0d0f;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.12em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-save:hover { background: #f7d06e; }
  .btn-save:active { transform: scale(0.98); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gold);
    color: #111;
    font-weight: 500;
    font-size: 0.9rem;
    padding: 0.6rem 1.4rem;
    border-radius: 100px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
    opacity: 0;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Saved movies ── */
  .saved-header {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }
  .saved-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    color: var(--text);
  }
  .count-pill {
    background: var(--bg3);
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 100px;
    border: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  .movies-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .movie-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: slideUp 0.3s ease both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .movie-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    min-width: 42px;
    line-height: 1;
    text-align: center;
  }
  .movie-score small {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .movie-info { flex: 1; min-width: 0; }
  .movie-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .movie-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .movie-stars-sm {
    font-size: 0.85rem;
    letter-spacing: 1px;
  }
  .movie-stars-sm .lit { color: var(--gold); }
  .movie-stars-sm .dim { color: var(--star-empty); }
  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 4px 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-delete:hover { border-color: var(--accent); color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--muted);
  }
  .empty-state p { font-size: 0.9rem; margin-top: 0.4rem; }
  .empty-reel { font-size: 2.5rem; opacity: 0.3; }

  .section-title-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .section-title-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header class="header">
    <div class="film-strip">
      <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    </div>
    <h1>muvin-<span>bluvin</span></h1>
    <p>&#9654; Your personal movie vault &nbsp;·&nbsp; v2.0</p>
    <div class="film-strip" style="margin-top:1rem">
      <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
      <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    </div>
  </header>

  <!-- Form card -->
  <div class="card">

    <!-- Movie Name -->
    <div class="card-label">Movie title</div>
    <input type="text" id="movieName" placeholder="e.g. Interstellar…" autocomplete="off" spellcheck="false">

    <hr class="divider">

    <!-- Star Rating -->
    <div class="card-label">Your rating</div>
    <div class="stars-row" id="starRow" role="group" aria-label="Star rating"></div>

    <div class="rating-row">
      <div class="num-input-wrap">
        <input type="number" id="numRating" min="1" max="10" placeholder="—" aria-label="Numeric rating 1 to 10">
        <span>/ 10</span>
      </div>
      <div class="rating-badge" id="ratingBadge">—<span>/10</span></div>
    </div>

    <hr class="divider">

    <!-- Reviewer Name -->
    <div class="card-label">Reviewed by</div>
    <input type="text" id="reviewerName" placeholder="Your name…" autocomplete="off">

    <!-- Save -->
    <button class="btn-save" id="saveBtn" onclick="saveMovie()">&#9654;&nbsp; Save for life</button>
  </div>

  <!-- Saved section -->
  <div class="section-title-line">
    <div class="saved-header">
      <h2>Saved Movies</h2>
      <span class="count-pill" id="countPill">0 films</span>
    </div>
  </div>

  <div class="movies-list" id="moviesList"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast">Saved!</div>

<script>
  const STORAGE_KEY = 'muvinbluvin_v2';
  let currentRating = 0;

  /* ── Build stars ── */
  const starRow = document.getElementById('starRow');
  for (let i = 1; i <= 10; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = '★';
    s.dataset.val = i;
    s.setAttribute('role', 'radio');
    s.setAttribute('aria-label', i + ' star' + (i > 1 ? 's' : ''));
    s.addEventListener('click', () => setRating(i));
    s.addEventListener('mouseenter', () => hoverStars(i));
    s.addEventListener('mouseleave', () => clearHover());
    starRow.appendChild(s);
  }

  function hoverStars(n) {
    document.querySelectorAll('.star').forEach(s => {
      const v = +s.dataset.val;
      s.classList.toggle('hovered', v <= n && v > currentRating);
    });
  }
  function clearHover() {
    document.querySelectorAll('.star').forEach(s => s.classList.remove('hovered'));
  }

  function setRating(n) {
    currentRating = n;
    document.querySelectorAll('.star').forEach(s => {
      s.classList.toggle('lit', +s.dataset.val <= n);
    });
    document.getElementById('numRating').value = n;
    document.getElementById('ratingBadge').innerHTML = n + '<span>/10</span>';
  }

  document.getElementById('numRating').addEventListener('input', function() {
    let v = Math.min(10, Math.max(1, parseInt(this.value) || 0));
    if (v) setRating(v);
  });

  /* ── Load saved ── */
  function loadMovies() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }
  function saveMovies(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  /* ── Save ── */
  function saveMovie() {
    const title = document.getElementById('movieName').value.trim();
    const reviewer = document.getElementById('reviewerName').value.trim();
    if (!title) { shake(document.getElementById('movieName')); return; }
    if (!currentRating) { shake(starRow); return; }
    if (!reviewer) { shake(document.getElementById('reviewerName')); return; }

    const movies = loadMovies();
    movies.unshift({
      id: Date.now(),
      title,
      rating: currentRating,
      reviewer,
      date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
    });
    saveMovies(movies);
    renderMovies();
    showToast('✦ ' + title + ' saved forever!');

    document.getElementById('movieName').value = '';
    document.getElementById('reviewerName').value = '';
    document.getElementById('numRating').value = '';
    document.getElementById('ratingBadge').innerHTML = '—<span>/10</span>';
    currentRating = 0;
    document.querySelectorAll('.star').forEach(s => s.classList.remove('lit'));
  }

  function shake(el) {
    el.style.transition = 'transform 0.05s';
    let i = 0;
    const moves = ['-6px','6px','-4px','4px','-2px','0'];
    const step = () => { el.style.transform = 'translateX('+moves[i]+')'; if (++i < moves.length) setTimeout(step, 55); else el.style.transform = ''; };
    step();
  }

  /* ── Delete ── */
  function deleteMovie(id) {
    const movies = loadMovies().filter(m => m.id !== id);
    saveMovies(movies);
    renderMovies();
  }

  /* ── Render ── */
  function starHTML(n) {
    let h = '';
    for (let i = 1; i <= 10; i++) h += '<span class="' + (i <= n ? 'lit' : 'dim') + '">★</span>';
    return h;
  }

  function renderMovies() {
    const movies = loadMovies();
    const list = document.getElementById('moviesList');
    const pill = document.getElementById('countPill');
    pill.textContent = movies.length + (movies.length === 1 ? ' film' : ' films');

    if (!movies.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-reel">🎞</div><p>No movies saved yet.<br>Rate something great!</p></div>';
      return;
    }
    list.innerHTML = movies.map((m, idx) => `
      <div class="movie-item" style="animation-delay:${idx * 0.04}s">
        <div class="movie-score">${m.rating}<small>/10</small></div>
        <div class="movie-info">
          <div class="movie-title">${escHtml(m.title)}</div>
          <div class="movie-meta">
            <span class="movie-stars-sm">${starHTML(m.rating)}</span>
            &nbsp;·&nbsp; by ${escHtml(m.reviewer)} &nbsp;·&nbsp; ${m.date}
          </div>
        </div>
        <button class="btn-delete" onclick="deleteMovie(${m.id})">✕</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Toast ── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  renderMovies();
</script>
</body>
</html>
